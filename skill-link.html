<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Link • Launchpad</title>
    <script>(function(){try{var t=localStorage.getItem('lp_theme');if(!t){t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="animation-container"></div>
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <span class="dot" aria-hidden="true"></span>
          <span class="name">Launchpad</span>
        </div>
        <nav class="nav">
          <a href="index.html">Home</a>
          <a href="profile.html">Profile</a>
          <a href="launchpad.html">Launchpad</a>
          <a href="skill-link.html">Skill Link</a>
          <button id="themeToggle" class="btn small theme-toggle" type="button">Dark</button>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="section">
        <h2>Skill Link</h2>
        <div class="filters card">
          <div class="filters-row">
            <input id="skillInput" type="text" class="skill-input" placeholder="Filter by skill(s): React, Node.js, SQL" />
            <button id="clearFilters" class="btn ghost" type="button">Clear</button>
          </div>
          <div id="presetChips" class="chips"></div>
        </div>

        <div class="directory two-cols">
          <div class="col card" id="projectsCol">
            <div class="col-header">
              <h3>Find Projects</h3>
              <span id="projectsCount" class="count">0</span>
            </div>
            <div id="projectsList" class="list"></div>
          </div>
          <div class="col card" id="peopleCol">
            <div class="col-header">
              <h3>Find People</h3>
              <span id="peopleCount" class="count">0</span>
            </div>
            <div id="peopleList" class="list"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <span class="muted">Built for internal organizations • Minimal dependencies</span>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
  </html>
